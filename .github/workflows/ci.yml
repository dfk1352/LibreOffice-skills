name: CI

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    if: github.repository == 'dfk1352/LibreOffice-skills'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Mypy
        run: uv run mypy src/

  test:
    if: github.repository == 'dfk1352/LibreOffice-skills'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-core libreoffice-writer libreoffice-calc libreoffice-impress

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: >
          uv run pytest tests/
          --ignore=tests/writer/test_writer_workflows.py
          --ignore=tests/calc/test_calc_workflows.py
          --ignore=tests/impress/test_impress_workflows.py
          --cov=src
          --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.xml
